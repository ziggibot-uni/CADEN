<html>
<head>
    <title>Cat Food Tracker</title>
</head>
<body>
    <h1>Cat Food Tracker</h1>
    <form>
        <label for="cat_name">Cat Name:</label>
        <input type="text" id="cat_name" name="cat_name"><br><br>
        <label for="food_brand">Food Brand:</label>
        <input type="text" id="food_brand" name="food_brand"><br><br>
        <label for="food_flavor">Food Flavor:</label>
        <input type="text" id="food_flavor" name="food_flavor"><br><br>
        <label for="consumption_date">Consumption Date:</label>
        <input type="date" id="consumption_date" name="consumption_date"><br><br>
        <input type="submit" value="Submit">
    </form>
</body>
</html>
