use_default_settings: true

search:
  formats:
    - html
    - json
  safe_search: 0
  autocomplete: ""
  default_lang: "en"

server:
  bind_address: "0.0.0.0"
  port: 8080
  base_url: "http://localhost:8888/"
  public_instance: false
  limiter: false
  image_proxy: false
  secret_key: "internal-dev-secret-change-this"

general:
  debug: false
  instance_name: "CADEN Search"

# Disable most engines to keep results fast and relevant — add back as needed
engines:
  - name: google
    engine: google
    use_mobile_ui: false
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    disabled: false

  - name: bing
    engine: bing
    disabled: false

  - name: wikipedia
    engine: wikipedia
    disabled: false

  - name: github
    engine: github
    disabled: false

  - name: stackoverflow
    engine: stackoverflow
    disabled: false
